<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Deploy NGINX</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .box {
      padding: 30px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
    }

    p {
      margin-top: 10px;
      font-size: 1.1rem;
    }

    .badge {
      margin-top: 15px;
      display: inline-block;
      padding: 5px 10px;
      border-radius: 6px;
      background: #00c853;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚀 Deploy OK!</h1>
    <p>Seu NGINX via Docker está funcionando corretamente.</p>
    <div class="badge">CI/CD Test Success</div>
  </div>
</body>
</html>
