services:

  nginx:
    image: nginx:1.25
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - web
    restart: always

  web:
    image: guifranco/devops-lab:web
    container_name: web-app
    expose:
      - "80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  zabbix-db:
    image: mysql:8.0
    container_name: zabbix-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - zabbix-db-data:/var/lib/mysql
    restart: always

  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-6.4.0
    container_name: zabbix-server
    env_file:
      - .env
    environment:
      DB_SERVER_HOST: ${ZBX_DB_HOST}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - zabbix-db
    ports:
      - "10051:10051"
    restart: always

volumes:
  zabbix-db-data:

  nginx-cache:
  nginx-run:
  nginx-logs:
