services:

  zabbix-db:
    image: mysql:8.0.36

    env_file:
      - .env

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin

    volumes:
      - zabbix-db-data:/var/lib/mysql

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

    networks:
      - monitoring


  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-6.4.0

    env_file:
      - .env

    environment:
      DB_SERVER_HOST: zabbix-db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    depends_on:
      zabbix-db:
        condition: service_healthy

    ports:
      - "10051:10051"

    volumes:
      - zabbix-server-data:/var/lib/zabbix
      - zabbix-alertscripts:/usr/lib/zabbix/alertscripts
      - zabbix-externalscripts:/usr/lib/zabbix/externalscripts
      - zabbix-export:/var/lib/zabbix/export
      - zabbix-snmptraps:/var/lib/zabbix/snmptraps

    restart: unless-stopped

    networks:
      - monitoring


  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-6.4.0

    env_file:
      - .env

    environment:
      DB_SERVER_HOST: zabbix-db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/Sao_Paulo

    depends_on:
      zabbix-db:
        condition: service_healthy

      zabbix-server:
        condition: service_started

    ports:
      - "8080:8080"

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

    networks:
      - monitoring


  grafana:
    image: grafana/grafana:10.4.2

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

    networks:
      - monitoring


volumes:
  zabbix-db-data:
  zabbix-server-data:
  grafana-data:
  zabbix-alertscripts:
  zabbix-externalscripts:
  zabbix-export:
  zabbix-snmptraps:


networks:
  monitoring:
    driver: bridge