events {}

http {
  server {
    listen 80;
    server_name localhost;
    return 301 https://\$host\$request_uri;
  }

  server {
    listen 443 ssl;

    ssl_certificate /etc/nginx/certs/cert.crt;
    ssl_certificate_key /etc/nginx/certs/cert.key;

    location / {
      proxy_pass http://web:80;
    }
  }
}
