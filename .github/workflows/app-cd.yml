name: CD

on:
  push:
    branches:
      - main

    paths:
      - "apps/site/**"
      - "apps/Dockerfile"
      - "apps/docker-compose.yml"
      - "apps/nginx/**"
      - ".github/workflows/app-cd.yml"

jobs:

  deploy:
    runs-on: [self-hosted, Linux, infra-dev]

    environment:
      name: production

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps
          file: ./apps/Dockerfile
          push: true
          tags: |
            guifranco/devops-lab:web-${{ github.sha }}
            guifranco/devops-lab:web-prod

      - name: Deploy
        run: |
          /home/guilherme/devops-lab/deploy/app/deploy.sh web-${{ github.sha }}

          #Test deployment