name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.0.0

      - name: Build
        run: docker build -t test-image .

      - name: Test
        run: |
          docker run -d -p 8081:80 test-image
          sleep 5
          curl -f http://localhost:8081