name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "\${{ secrets.DOCKER_PASS }}" | docker login -u "\${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build image
        run: docker build -t seuusuario/devops-lab:web ./web

      - name: Push image
        run: docker push seuusuario/devops-lab:web

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy (simulado)
        run: echo "docker-compose pull && docker-compose up -d"
