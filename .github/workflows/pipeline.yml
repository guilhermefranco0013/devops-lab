name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, infra-dev]

    concurrency:
      group: deploy
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔥 Cache de build (MUITO mais rápido)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push (com cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            guifranco/devops-lab:web
            guifranco/devops-lab:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🧪 Validação antes do deploy
      - name: Test container
        run: |
          docker run -d --name test-container -p 8081:80 guifranco/devops-lab:web
          sleep 5
          curl -f http://localhost:8081 || (echo "App failed!" && exit 1)
          docker rm -f test-container

      # 🚀 Deploy
      - name: Deploy App
        run: |
          cd ~/devops-lab
          ./deploy.sh

      - name: Deploy Monitoring
        run: |
          cd ~/devops-lab
          ./deploy-monitoring.sh